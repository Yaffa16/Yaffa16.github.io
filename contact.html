<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weirdwithcode — Contact</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ---------- RESET & BODY ---------- */
body {
    margin: 0;
    padding: 0;
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.65;
    overflow-x: hidden;
    background: #F9F7F1;
    color: #1B1B1B;
}
body.dark-mode {
    background: #1B1B1B;
    color: #F0F0F0;
}

/* ---------- HERO ---------- */
.hero-section {
    position: fixed;
    inset: 0;
    height: 100vh;
    background: #000080;
    z-index: -1;
}

/* ---------- PAGE ---------- */
.page {
    max-width: 1200px;
    min-height: 100vh;
    background: #FFFFFF;
    margin: 0 auto 40px;
    padding: 32px 56px 56px;
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
    box-shadow:
        0 -10px 30px rgba(0,0,0,0.12),
        0 12px 48px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
}
body.dark-mode .page {
    background: #1F1F1F;
}

/* ---------- HEADER ---------- */
.header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.95em;
    margin-bottom: 48px;
    padding-bottom: 8px;
    border-bottom: 1px solid #D6CFC0;
}
.header-bar b {
    font-family: 'Merriweather', serif;
    font-size: 1.2em;
    cursor: pointer;
}
.header-bar a {
    color: inherit;
    text-decoration: none;
    margin-left: 20px;
}
.header-bar a:hover { color: #FF9933; }

/* ---------- CONTACT ---------- */
.contact-container {
    max-width: 720px;
}
.contact-container h1 {
    font-family: 'Merriweather', serif;
    font-size: 2.4em;
    margin-bottom: 16px;
}
.contact-container p {
    margin-bottom: 24px;
}

.contact-email {
    font-size: 1.1em;
}
.contact-email a {
    color: #000080;
    text-decoration: none;
    font-weight: 600;
}
.contact-email a:hover {
    color: #FF9933;
}

/* ---------- FOOTER ---------- */
.footer {
    margin-top: auto;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    font-size: 0.85em;
}
.switch {
    position: relative;
    width: 50px;
    height: 24px;
}
.switch input { display: none; }
.slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 24px;
    cursor: pointer;
}
.slider:before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.3s;
}
input:checked + .slider {
    background: #FF9933;
}
input:checked + .slider:before {
    transform: translateX(26px);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero-section"></section>

<!-- PAGE -->
<div class="page">

  <!-- HEADER -->
  <div class="header-bar">
    <b onclick="window.location.href='index.html'">weird with code</b>
    <div>
      <a href="bio.html">Bio</a>
      <a href="cv.html">CV</a>
      <a href="Works.html">Works</a>
      <a href="contact.html">Contact</a>
      <a href="https://www.instagram.com/weirdwithcode/?hl=en" target="_blank">Instagram</a>
    </div>
  </div>

  <!-- CONTACT CONTENT -->
  <div class="contact-container">
    <h1>Contact</h1>
    <p>
      For collaborations, exhibitions, talks, commissions, or general inquiries,
      feel free to reach out.
    </p>

    <p class="contact-email">
      Personal Email:
      <a href="mailto:jain.yasha@gmail.com">
        jain.yasha@gmail.com
      </a>
    </p>

          <p class="contact-email">
      Work Email:
      <a href="mailto:jain@zkm.de">
        jain@zkm.de
      </a>
    </p>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <small>JIYO · AUR · JEENE · DO</small>
    <label class="switch">
      <input type="checkbox" id="modeToggle">
      <span class="slider"></span>
    </label>
  </div>

</div>

<script>
const toggle = document.getElementById('modeToggle');
if(localStorage.getItem('darkMode') === 'true') {
  document.body.classList.add('dark-mode');
  toggle.checked = true;
}
toggle.addEventListener('change', () => {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
});
</script>

</body>
</html>
