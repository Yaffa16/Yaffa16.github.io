<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RESONANCE — Fragment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  :root {
    --neon: #39ff14;
    --neon-dim: #1aff0040;
    --neon-glow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 40px #39ff1488;
    --dark: #050505;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: var(--neon);
    cursor: crosshair;
  }

  /* Scanlines overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.12) 2px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Noise grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.35;
  }

  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Rotating whole image ── */
  #whole {
    position: absolute;
    width: 420px; height: 560px;
    transform-style: preserve-3d;
    animation: rotateUnit 6s ease-in-out infinite;
    transition: opacity 0.3s;
    filter: drop-shadow(0 0 30px rgba(57,255,20,0.15));
  }

  #whole img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 4px;
    display: block;
  }

  /* Subtle neon border on whole */
  #whole::after {
    content: '';
    position: absolute; inset: -2px;
    border: 1px solid rgba(57,255,20,0.2);
    border-radius: 4px;
    box-shadow: inset 0 0 20px rgba(57,255,20,0.05);
  }

  @keyframes rotateUnit {
    0%   { transform: rotateY(-12deg) rotateX(4deg) scale(1); }
    25%  { transform: rotateY(6deg) rotateX(-3deg) scale(1.02); }
    50%  { transform: rotateY(14deg) rotateX(5deg) scale(1); }
    75%  { transform: rotateY(-4deg) rotateX(-4deg) scale(1.01); }
    100% { transform: rotateY(-12deg) rotateX(4deg) scale(1); }
  }

  /* ── Fragments container ── */
  #fragments {
    position: absolute;
    width: 420px; height: 560px;
    opacity: 0;
    pointer-events: none;
  }

  .frag {
    position: absolute;
    overflow: hidden;
    opacity: 0;
    will-change: transform, opacity;
    /* Neon polygon outline via clip-path + box-shadow trick with svg filter */
    filter: drop-shadow(0 0 6px var(--neon)) drop-shadow(0 0 14px var(--neon));
  }

  .frag::after {
    content: '';
    position: absolute; inset: 0;
    border: 1.5px solid var(--neon);
    pointer-events: none;
    box-shadow: inset 0 0 8px rgba(57,255,20,0.3);
    /* Clip to same polygon as parent */
    clip-path: inherit;
  }

  .frag img {
    position: absolute;
    width: 420px; height: 560px;
    top: 0; left: 0;
    object-fit: cover;
  }

  /* ── HUD text overlay ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 28px 36px;
    z-index: 50;
    pointer-events: none;
  }

  .hud-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    letter-spacing: 0.12em;
    line-height: 1;
    color: var(--neon);
    text-shadow: var(--neon-glow);
  }

  .hud-sub {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: rgba(57,255,20,0.55);
    margin-top: 6px;
    text-transform: uppercase;
  }

  #hud-right {
    text-align: right;
  }

  #bottom-bar {
    position: fixed;
    bottom: 28px; left: 36px; right: 36px;
    display: flex; justify-content: space-between; align-items: flex-end;
    z-index: 50;
    pointer-events: none;
  }

  .bar-text {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(57,255,20,0.4);
    text-transform: uppercase;
  }

  /* Click instruction */
  #cta {
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.4em;
    color: var(--neon);
    text-shadow: var(--neon-glow);
    z-index: 50;
    animation: pulse 2s ease-in-out infinite;
    white-space: nowrap;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Fragment explosion animation keyframes generated via JS */

  /* Reassemble button */
  #reassemble {
    position: fixed;
    bottom: 80px; left: 50%; transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.4em;
    color: var(--dark);
    background: var(--neon);
    border: none;
    padding: 10px 32px;
    cursor: pointer;
    z-index: 60;
    display: none;
    box-shadow: var(--neon-glow);
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    transition: transform 0.1s;
  }
  #reassemble:hover { transform: translateX(-50%) scale(1.04); }
  #reassemble:active { transform: translateX(-50%) scale(0.97); }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 40px; height: 40px;
    z-index: 50;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 20px; left: 20px; }
  .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner-br { bottom: 20px; right: 20px; transform: scale(-1,-1); }
</style>
</head>
<body>

<!-- Corner brackets -->
<div class="corner corner-tl"><svg viewBox="0 0 40 40"><path d="M0 40 L0 0 L40 0" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.6"/></svg></div>
<div class="corner corner-tr"><svg viewBox="0 0 40 40"><path d="M0 40 L0 0 L40 0" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.6"/></svg></div>
<div class="corner corner-bl"><svg viewBox="0 0 40 40"><path d="M0 40 L0 0 L40 0" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.6"/></svg></div>
<div class="corner corner-br"><svg viewBox="0 0 40 40"><path d="M0 40 L0 0 L40 0" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.6"/></svg></div>

<div id="hud">
  <div>
    <div class="hud-label">RESONANCE</div>
    <div class="hud-sub">Dimensional Fragment System v0.9</div>
  </div>
  <div id="hud-right">
    <div class="hud-sub" id="status">STATUS: UNIFIED</div>
    <div class="hud-sub" style="margin-top:4px;" id="coord">Ω 0.000 / Δ 0.000</div>
  </div>
</div>

<div id="cta">[ CLICK TO SHATTER ]</div>
<button id="reassemble">[ REASSEMBLE ]</button>

<div id="stage">
  <div id="whole">
    <img id="srcImg" src="img.png" alt="resonance"/>
  </div>
  <div id="fragments"></div>
</div>

<div id="bottom-bar">
  <div class="bar-text">LAT 48.7758° N — LON 9.1829° E</div>
  <div class="bar-text" id="timer">T+000.00s</div>
  <div class="bar-text">FRAGMENT COUNT: <span id="fragCount">00</span></div>
</div>

<script>
// ── Fragment polygon definitions (10 rugged irregular pieces) ──
// Each piece: clip-path polygon points as % of the 420×560 container
// Designed to tile the full image with jagged/rugged edges

const FRAGS = [
  // 0 — top-left peak
  { poly: '0% 0%, 48% 0%, 52% 8%, 38% 22%, 44% 38%, 28% 42%, 12% 30%, 0% 36%' },
  // 1 — top-right
  { poly: '48% 0%, 100% 0%, 100% 28%, 82% 22%, 70% 34%, 58% 26%, 52% 8%' },
  // 2 — upper-left band
  { poly: '0% 36%, 12% 30%, 28% 42%, 22% 56%, 8% 52%, 0% 60%' },
  // 3 — center-top
  { poly: '38% 22%, 52% 8%, 58% 26%, 70% 34%, 64% 50%, 50% 56%, 44% 38%' },
  // 4 — right upper-mid
  { poly: '70% 34%, 82% 22%, 100% 28%, 100% 54%, 86% 58%, 72% 52%, 64% 50%' },
  // 5 — left center
  { poly: '0% 60%, 8% 52%, 22% 56%, 28% 72%, 14% 78%, 0% 76%' },
  // 6 — center mass
  { poly: '44% 38%, 50% 56%, 64% 50%, 72% 64%, 56% 72%, 40% 66%, 28% 72%, 22% 56%, 28% 42%' },
  // 7 — right center-lower
  { poly: '72% 52%, 86% 58%, 100% 54%, 100% 80%, 84% 86%, 72% 78%, 72% 64%, 64% 50%' },
  // 8 — lower-left
  { poly: '0% 76%, 14% 78%, 28% 72%, 40% 66%, 36% 84%, 18% 92%, 0% 88%, 0% 100%, 10% 100%' },
  // 9 — bottom-right + bottom
  { poly: '40% 66%, 56% 72%, 72% 64%, 72% 78%, 84% 86%, 100% 80%, 100% 100%, 10% 100%, 18% 92%, 36% 84%' },
];

const IMG_SRC = document.getElementById('srcImg').src;
const fragContainer = document.getElementById('fragments');
const whole = document.getElementById('whole');
const cta = document.getElementById('cta');
const reassembleBtn = document.getElementById('reassemble');
const statusEl = document.getElementById('status');
const fragCountEl = document.getElementById('fragCount');
const timerEl = document.getElementById('timer');

let shattered = false;
let timerInterval = null;
let elapsed = 0;

// Build fragment elements
FRAGS.forEach((f, i) => {
  const div = document.createElement('div');
  div.className = 'frag';
  div.id = `frag-${i}`;
  div.style.cssText = `
    top: 0; left: 0;
    width: 420px; height: 560px;
    clip-path: polygon(${f.poly});
  `;

  const img = document.createElement('img');
  img.src = IMG_SRC;
  img.alt = '';
  div.appendChild(img);

  fragContainer.appendChild(div);
});

// Coordinate tracker
document.addEventListener('mousemove', e => {
  const x = ((e.clientX / window.innerWidth) * 2 - 1).toFixed(3);
  const y = ((e.clientY / window.innerHeight) * 2 - 1).toFixed(3);
  document.getElementById('coord').textContent = `Ω ${x} / Δ ${y}`;
});

// Timer
function startTimer() {
  elapsed = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsed += 0.04;
    timerEl.textContent = `T+${elapsed.toFixed(2).padStart(6,'0')}s`;
  }, 40);
}

// ── SHATTER ──
function shatter() {
  if (shattered) return;
  shattered = true;
  cta.style.display = 'none';
  statusEl.textContent = 'STATUS: FRAGMENTING';
  startTimer();

  // Fade + scale out whole
  whole.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
  whole.style.opacity = '0';
  whole.style.transform = 'scale(1.08)';

  setTimeout(() => {
    whole.style.display = 'none';
    fragContainer.style.opacity = '1';
    fragContainer.style.pointerEvents = 'auto';

    const frags = document.querySelectorAll('.frag');
    fragCountEl.textContent = String(frags.length).padStart(2,'0');

    frags.forEach((frag, i) => {
      // Each fragment flies out to a unique rugged direction
      const angle = (i / frags.length) * Math.PI * 2 + (Math.random() * 0.5 - 0.25);
      const dist = 180 + Math.random() * 220;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      const rz = (Math.random() - 0.5) * 40;
      const rx = (Math.random() - 0.5) * 20;
      const delay = i * 40; // stagger

      frag.style.transition = 'none';
      frag.style.opacity = '0';
      frag.style.transform = 'translate(0,0) rotate(0deg)';

      setTimeout(() => {
        // Flash on
        frag.style.transition = `opacity 0.06s ease, transform 0s`;
        frag.style.opacity = '1';

        setTimeout(() => {
          frag.style.transition = `transform 1.2s cubic-bezier(0.22,1,0.36,1), opacity 1.4s ease`;
          frag.style.transform = `translate(${tx}px, ${ty}px) rotate(${rz}deg) rotateX(${rx}deg)`;
          frag.style.opacity = '0.92';

          // Then drift and fade out slowly
          setTimeout(() => {
            frag.style.transition = `transform 3s ease-in, opacity 2.5s ease`;
            frag.style.transform = `translate(${tx * 1.4}px, ${ty * 1.4 + 60}px) rotate(${rz * 1.3}deg) rotateX(${rx}deg)`;
            frag.style.opacity = '0.3';
          }, 1200);
        }, 30);
      }, delay);
    });

    setTimeout(() => {
      statusEl.textContent = 'STATUS: SCATTERED';
      clearInterval(timerInterval);
      reassembleBtn.style.display = 'block';
    }, 2200);

  }, 260);
}

// ── REASSEMBLE ──
function reassemble() {
  reassembleBtn.style.display = 'none';
  statusEl.textContent = 'STATUS: REASSEMBLING';
  fragCountEl.textContent = '00';
  startTimer();

  const frags = document.querySelectorAll('.frag');

  frags.forEach((frag, i) => {
    setTimeout(() => {
      frag.style.transition = `transform 0.9s cubic-bezier(0.34,1.56,0.64,1), opacity 0.7s ease`;
      frag.style.transform = 'translate(0,0) rotate(0deg) rotateX(0deg)';
      frag.style.opacity = '1';
    }, i * 60);
  });

  setTimeout(() => {
    fragContainer.style.opacity = '0';
    fragContainer.style.pointerEvents = 'none';

    frags.forEach(f => {
      f.style.opacity = '0';
      f.style.transform = 'translate(0,0)';
    });

    whole.style.display = 'block';
    whole.style.transform = 'scale(0.92)';
    whole.style.opacity = '0';

    setTimeout(() => {
      whole.style.transition = 'opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.3,0.64,1)';
      whole.style.opacity = '1';
      whole.style.transform = 'scale(1)';
      shattered = false;
      clearInterval(timerInterval);
      statusEl.textContent = 'STATUS: UNIFIED';
      cta.style.display = 'block';
    }, 80);
  }, 1400);
}

document.getElementById('stage').addEventListener('click', shatter);
reassembleBtn.addEventListener('click', (e) => { e.stopPropagation(); reassemble(); });

// Auto-convert image to data URL to avoid cross-origin issues when clipping
window.addEventListener('load', () => {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    try {
      const dataUrl = canvas.toDataURL('image/png');
      document.querySelectorAll('.frag img').forEach(i => i.src = dataUrl);
      document.getElementById('srcImg').src = dataUrl;
    } catch(e) { /* CORS fallback — keep original src */ }
  };
  img.src = IMG_SRC;
});
</script>
</body>
</html>
