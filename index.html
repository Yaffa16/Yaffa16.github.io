<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weird With Code</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;cursor:none;background:#bdbdbd}
:root{
  --green:#39ff14;--bg:#bdbdbd;--bg2:#b0b0b0;--bg3:#a8a8a8;
  --ink:#1a1a1a;--ink2:#3a3a3a;--ink3:#6a6a6a;
  --line:rgba(0,0,0,.12);--line2:rgba(0,0,0,.07);
}
#cursor{position:fixed;pointer-events:none;z-index:9999;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green),0 0 14px var(--green);transform:translate(-50%,-50%);transition:width .15s,height .15s}
#cursor.big{width:20px;height:20px;background:transparent;border:1.5px solid var(--green);box-shadow:none}
#svgDefs{position:absolute;width:0;height:0;overflow:hidden}
#lineCanvas{position:fixed;inset:0;pointer-events:none;z-index:20}
#whole{position:fixed;z-index:8;top:50%;left:50%;transform:translate(-50%,-50%);width:var(--iw);height:var(--ih);pointer-events:none;opacity:0;transition:opacity 1.2s ease}
#whole img{width:100%;height:100%;object-fit:contain}
.frag{position:fixed;top:0;left:0;width:var(--iw);height:var(--ih);overflow:visible;opacity:0;will-change:transform;z-index:10;pointer-events:none}
.frag-clip{position:absolute;top:0;left:0;width:var(--iw);height:var(--ih);overflow:hidden}
.frag-clip img{position:absolute;top:0;left:0;width:var(--iw);height:var(--ih);object-fit:contain;display:block}
.frag-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none}
.site-header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 44px;background:var(--bg);flex-shrink:0}
.site-header-name,.site-header-nav a{font-family:'Barlow Condensed',sans-serif;color:#fff;cursor:pointer;transition:color .2s,filter .2s;text-decoration:none}
.site-header-name{font-weight:700;font-size:20px;letter-spacing:.06em;text-transform:uppercase}
.site-header-nav{font-weight:300;font-size:16px;letter-spacing:.14em;text-transform:uppercase;display:flex;gap:32px}
.site-header-name:hover,.site-header-nav a:hover{color:var(--green);filter:drop-shadow(0 0 6px var(--green))}
#lineCanvas text{filter:drop-shadow(0 0 5px #39ff14);opacity:0;transition:opacity .8s}
#lineCanvas circle{filter:drop-shadow(0 0 5px #39ff14);opacity:0;transition:opacity .8s}
#nodePoly{fill:none;stroke:#39ff14;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 4px #39ff14);opacity:0;transition:opacity .8s}
</style>
</head>
<body>

<div id="cursor"></div>

<svg id="svgDefs" width="0" height="0">
  <defs>
    <filter id="whiteGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="b2"/>
      <feFlood flood-color="#fff" flood-opacity="1" result="w"/>
      <feComposite in="w" in2="b2" operator="in" result="g2"/>
      <feComposite in="w" in2="b1" operator="in" result="g1"/>
      <feMerge><feMergeNode in="g2"/><feMergeNode in="g1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<div class="site-header">
  <span class="site-header-name">Weird With Code</span>
  <nav class="site-header-nav">
    <a href="work/work.html">Work</a>
    <a href="work/bio.html">About</a>
  </nav>
</div>

<svg id="lineCanvas" xmlns="http://www.w3.org/2000/svg">
  <polygon id="nodePoly" points="0,0 0,0 0,0 0,0"/>
  <circle id="nd0" cx="0" cy="0" r="4" fill="#39ff14"/>
  <circle id="nd1" cx="0" cy="0" r="4" fill="#39ff14"/>
  <circle id="nd2" cx="0" cy="0" r="4" fill="#39ff14"/>
  <circle id="nd3" cx="0" cy="0" r="4" fill="#39ff14"/>
  <text id="ltxt0" font-family="'Barlow Condensed',sans-serif" font-size="13" letter-spacing="1" fill="#39ff14">Creative Coding</text>
  <text id="ltxt1" font-family="'Barlow Condensed',sans-serif" font-size="13" letter-spacing="1" fill="#39ff14">Graphic Designer</text>
  <text id="ltxt2" font-family="'Barlow Condensed',sans-serif" font-size="13" letter-spacing="1" fill="#39ff14">Multidisciplinary Practice</text>
  <text id="ltxt3" font-family="'Barlow Condensed',sans-serif" font-size="13" letter-spacing="1" fill="#39ff14">Visual Design</text>
</svg>

<div id="whole"><img id="srcImg" src="img.png" alt=""/></div>

<script>
var VW=window.innerWidth,VH=window.innerHeight,CX=VW/2,CY=VH/2;
var mx=CX,my=CY;
var srcImg=document.getElementById('srcImg'),wholeEl=document.getElementById('whole');
var lineCanvas=document.getElementById('lineCanvas'),nodePoly=document.getElementById('nodePoly');
var nodeDots=[0,1,2,3].map(function(i){return document.getElementById('nd'+i);});
var labelTxts=[0,1,2,3].map(function(i){return document.getElementById('ltxt'+i);});
var phase='fadein',breathStart=null,breathDuration=2200,currentBreathScale=1;
var NS='http://www.w3.org/2000/svg';
var W,H,OX,OY;

var FRAGS=[
  {poly:'62% 0%, 80% 0%, 78% 8%, 68% 12%, 60% 10%',cx:.72,cy:.05},
  {poly:'22% 8%, 40% 10%, 42% 22%, 28% 28%, 24% 22%',cx:.32,cy:.16},
  {poly:'40% 10%, 60% 10%, 58% 24%, 46% 28%, 42% 22%',cx:.50,cy:.17},
  {poly:'60% 10%, 78% 8%, 80% 20%, 68% 26%, 58% 24%',cx:.70,cy:.16},
  {poly:'24% 22%, 42% 22%, 44% 36%, 30% 42%, 22% 38%',cx:.33,cy:.30},
  {poly:'42% 22%, 58% 24%, 56% 38%, 46% 42%, 44% 36%',cx:.50,cy:.30},
  {poly:'58% 24%, 80% 20%, 82% 34%, 70% 40%, 56% 38%',cx:.70,cy:.29},
  {poly:'0% 38%, 10% 42%, 22% 38%, 20% 54%, 8% 58%, 0% 52%',cx:.09,cy:.46},
  {poly:'22% 38%, 44% 36%, 46% 52%, 32% 56%, 20% 54%',cx:.32,cy:.46},
  {poly:'44% 36%, 56% 38%, 58% 52%, 48% 56%, 46% 52%',cx:.51,cy:.46},
  {poly:'56% 38%, 70% 40%, 82% 34%, 80% 52%, 66% 56%, 58% 52%',cx:.70,cy:.45},
  {poly:'20% 54%, 32% 56%, 46% 52%, 44% 68%, 28% 72%, 18% 68%',cx:.32,cy:.62},
  {poly:'46% 52%, 48% 56%, 58% 52%, 60% 66%, 50% 70%, 44% 68%',cx:.52,cy:.61},
  {poly:'58% 52%, 66% 56%, 80% 52%, 82% 66%, 68% 70%, 60% 66%',cx:.71,cy:.60},
  {poly:'18% 68%, 28% 72%, 44% 68%, 42% 84%, 22% 88%, 16% 82%',cx:.30,cy:.76},
  {poly:'44% 68%, 50% 70%, 60% 66%, 62% 82%, 50% 86%, 42% 84%',cx:.52,cy:.75},
  {poly:'60% 66%, 68% 70%, 82% 66%, 80% 82%, 66% 86%, 62% 82%',cx:.72,cy:.75},
  {poly:'42% 84%, 50% 86%, 62% 82%, 66% 86%, 80% 82%, 78% 94%, 42% 94%',cx:.61,cy:.90},
];

function parsePoly(s){
  return s.split(',').map(function(p){var a=p.trim().split(/\s+/);return{px:parseFloat(a[0])/100,py:parseFloat(a[1])/100};});
}

var state=FRAGS.map(function(f){
  return{x:0,y:0,rot:0,tx:0,ty:0,tr:0,vx:0,vy:0,vr:0,el:null,svgPoly:null,svgGlow:null,pts:parsePoly(f.poly)};
});

FRAGS.forEach(function(f,i){
  var outer=document.createElement('div');outer.className='frag';
  var inner=document.createElement('div');inner.className='frag-clip';inner.style.clipPath='polygon('+f.poly+')';
  var img=document.createElement('img');img.src='img.png';img.alt='';
  inner.appendChild(img);outer.appendChild(inner);
  var svg=document.createElementNS(NS,'svg');svg.classList.add('frag-svg');
  var pGlow=document.createElementNS(NS,'polygon');
  pGlow.setAttribute('fill','none');pGlow.setAttribute('stroke','rgba(255,255,255,.55)');
  pGlow.setAttribute('stroke-width','3');pGlow.setAttribute('stroke-linejoin','round');
  pGlow.setAttribute('filter','url(#whiteGlow)');svg.appendChild(pGlow);
  var pEdge=document.createElementNS(NS,'polygon');
  pEdge.setAttribute('fill','none');pEdge.setAttribute('stroke','rgba(255,255,255,.92)');
  pEdge.setAttribute('stroke-width','1');pEdge.setAttribute('stroke-linejoin','round');
  svg.appendChild(pEdge);outer.appendChild(svg);
  document.body.appendChild(outer);
  state[i].el=outer;state[i].svgPoly=pEdge;state[i].svgGlow=pGlow;
});

function initSize(){
  var nw=srcImg.naturalWidth||800,nh=srcImg.naturalHeight||900;
  var sc=Math.min(VW*.66/nw,VH*.96/nh,1);
  W=Math.round(nw*sc);H=Math.round(nh*sc);
  document.documentElement.style.setProperty('--iw',W+'px');
  document.documentElement.style.setProperty('--ih',H+'px');
  OX=CX-W/2;OY=CY-H/2;
  document.querySelectorAll('.frag-clip,.frag-clip img,.frag').forEach(function(el){el.style.width=W+'px';el.style.height=H+'px';});
  state.forEach(function(s){
    var vb='0 0 '+W+' '+H;
    s.el.querySelector('.frag-svg').setAttribute('viewBox',vb);
    var pts=s.pts.map(function(p){return(p.px*W).toFixed(1)+','+(p.py*H).toFixed(1);}).join(' ');
    s.svgPoly.setAttribute('points',pts);s.svgGlow.setAttribute('points',pts);
  });
}

var nodeArms=[
  {angle:Math.PI*.15,rBase:220},{angle:Math.PI*.62,rBase:270},
  {angle:Math.PI*1.15,rBase:240},{angle:Math.PI*1.68,rBase:200},
];
var nodes=nodeArms.map(function(){return{sx:CX,sy:CY};});

function assignScatterTargets(){
  state.forEach(function(s){
    s.tx=OX+(Math.random()*2-1)*VW*.45;
    s.ty=OY+(Math.random()*2-1)*VH*.45;
    s.tr=(s.rot>0?-1:1)*(Math.random()>.5?1:-1)*(20+Math.random()*65);
  });
}

document.addEventListener('click',function(e){
  if(phase==='scattered'&&!e.target.closest('a,[data-nav]'))assignScatterTargets();
});

function resizeSVG(){
  VW=window.innerWidth;VH=window.innerHeight;CX=VW/2;CY=VH/2;
  lineCanvas.setAttribute('viewBox','0 0 '+VW+' '+VH);
  lineCanvas.setAttribute('width',VW);lineCanvas.setAttribute('height',VH);
}
resizeSVG();window.addEventListener('resize',resizeSVG);

function shatter(){
  phase='shattering';
  state.forEach(function(s){s.x=OX;s.y=OY;s.rot=0;s.vx=0;s.vy=0;s.vr=0;s.el.style.opacity='1';s.el.style.transform='translate('+OX+'px,'+OY+'px)';});
  wholeEl.style.transition='opacity 0.3s ease';wholeEl.style.opacity='0';
  setTimeout(function(){
    assignScatterTargets();phase='scattered';
    setTimeout(function(){
      nodePoly.style.opacity='1';
      nodeDots.forEach(function(d){d.style.opacity='1';});
      labelTxts.forEach(function(l){l.style.opacity='1';});
    },600);
  },220);
}

function easeInOutSine(t){return -(Math.cos(Math.PI*t)-1)/2;}

function loop(ts){
  requestAnimationFrame(loop);
  if(phase==='breathing'||phase==='fadein'){
    if(!breathStart)breathStart=ts;
    var t=easeInOutSine((Math.sin((ts-breathStart)/breathDuration*Math.PI*2)+1)/2);
    currentBreathScale=1+t*.05;
    wholeEl.style.transform='translate(-50%,-50%) scale('+currentBreathScale+')';
    return;
  }
  if(phase!=='scattered')return;
  state.forEach(function(s){
    s.vx+=(s.tx-s.x)*.01;s.vy+=(s.ty-s.y)*.01;s.vr+=(s.tr-s.rot)*.01;
    s.vx*=.80;s.vy*=.80;s.vr*=.80;
    s.x+=s.vx;s.y+=s.vy;s.rot+=s.vr;
    s.el.style.transform='translate('+s.x.toFixed(1)+'px,'+s.y.toFixed(1)+'px) rotate('+s.rot.toFixed(2)+'deg)';
  });
  var offX=(mx-CX)/Math.max(CX,1),offY=(my-CY)/Math.max(CY,1);
  nodeArms.forEach(function(arm,i){
    var tx=mx+Math.cos(arm.angle)*arm.rBase*(1+offX*Math.cos(arm.angle)*.7);
    var ty=my+Math.sin(arm.angle)*arm.rBase*(1+offY*Math.sin(arm.angle)*.7);
    nodes[i].sx+=(tx-nodes[i].sx)*.12;nodes[i].sy+=(ty-nodes[i].sy)*.12;
    nodes[i].sx=Math.max(20,Math.min(VW-20,nodes[i].sx));nodes[i].sy=Math.max(20,Math.min(VH-20,nodes[i].sy));
  });
  var pts=nodes.map(function(n){return n.sx.toFixed(1)+','+n.sy.toFixed(1);}).join(' ');
  nodePoly.setAttribute('points',pts);
  nodes.forEach(function(n,i){nodeDots[i].setAttribute('cx',n.sx.toFixed(1));nodeDots[i].setAttribute('cy',n.sy.toFixed(1));});
  nodes.forEach(function(n,i){
    var nx=nodes[(i+1)%nodes.length];
    var mx2=(n.sx+nx.sx)*.5,my2=(n.sy+nx.sy)*.5;
    var ang=Math.atan2(nx.sy-n.sy,nx.sx-n.sx)*180/Math.PI;
    if(ang>90||ang<-90)ang+=180;
    labelTxts[i].setAttribute('x',mx2.toFixed(1));labelTxts[i].setAttribute('y',my2.toFixed(1));
    labelTxts[i].setAttribute('text-anchor','middle');labelTxts[i].setAttribute('dominant-baseline','middle');
    labelTxts[i].setAttribute('transform','rotate('+ang.toFixed(1)+','+mx2.toFixed(1)+','+my2.toFixed(1)+')');
    labelTxts[i].setAttribute('dy','-7');
  });
}

function ready(){
  initSize();
  state.forEach(function(s){s.x=OX;s.y=OY;s.el.style.transform='translate('+OX+'px,'+OY+'px) scale('+currentBreathScale+')';});
  wholeEl.style.opacity='0';wholeEl.style.transition='opacity 1.2s ease';
  setTimeout(function(){wholeEl.style.opacity='1';phase='breathing';breathStart=null;setTimeout(shatter,2000);},300);
  nodePoly.style.opacity='1';
  nodeDots.forEach(function(d){d.style.opacity='1';});
  labelTxts.forEach(function(l){l.style.opacity='1';});
}
srcImg.addEventListener('load',ready);
if(srcImg.complete&&srcImg.naturalWidth)ready();
requestAnimationFrame(loop);

// Cursor
var cur=document.getElementById('cursor');
document.addEventListener('mousemove',function(e){
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
  mx=e.clientX;my=e.clientY;
});
var hoverSel='a,button,[data-nav]';
document.addEventListener('mouseover',function(e){if(e.target.closest(hoverSel))cur.classList.add('big');});
document.addEventListener('mouseout',function(e){if(e.target.closest(hoverSel))cur.classList.remove('big');});
</script>
</body>
</html>
